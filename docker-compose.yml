services:
  api:
    build: .
    container_name: doc_api
    volumes:
      - ./data:/app/data
    ports:
      - "8000:8000"
    command: ["uvicorn", "app.api:app", "--host", "0.0.0.0", "--port", "8000"]

  ui:
    build: .
    container_name: doc_ui
    environment:
      - API_URL=http://api:8000  # <--- THIS IS THE KEY FOR DOCKER
    ports:
      - "8501:8501"
    depends_on:
      - api
    command: ["streamlit", "run", "app/ui.py", "--server.address", "0.0.0.0"]